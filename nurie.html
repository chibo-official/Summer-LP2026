<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>コックさんの おこのみやき ぬりえ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8EC;
    --panel:#FFFFFF;
    --ink:#2B2118;
    --crimson:#8B1A1A;
    --gold:#C9A84C;
    --shadow: 0 8px 24px rgba(43,33,24,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    font-family:'M PLUS Rounded 1c', sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    overflow-x:hidden;
  }
  body{
    background-image:
      radial-gradient(circle at 20px 20px, rgba(139,26,26,0.035) 2px, transparent 2px),
      radial-gradient(circle at 60px 60px, rgba(139,26,26,0.035) 2px, transparent 2px);
    background-size:80px 80px;
  }
  header{
    background:var(--crimson);
    border-bottom:5px solid var(--gold);
    padding:16px 16px 14px;
    text-align:center;
  }
  header h1{
    margin:0;
    color:#fff;
    font-size:clamp(18px,5vw,24px);
    font-weight:800;
    letter-spacing:.02em;
  }
  header p{
    margin:6px 0 0;
    color:#F3D9D9;
    font-size:clamp(11px,3vw,14px);
    font-weight:400;
  }
  .brandmark{
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.35);
    padding:3px 12px 3px 8px;
    border-radius:999px;
    font-size:11px;
    color:#fff;
    margin-bottom:6px;
  }
  .brandmark .dot{ width:8px;height:8px;border-radius:50%;background:var(--gold); }

  main{
    max-width:520px;
    margin:0 auto;
    padding:14px 12px 150px;
  }

  .canvas-wrap{
    position:relative;
    background:var(--panel);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:10px;
    border:3px solid var(--ink);
  }
  .tape{
    position:absolute;
    width:50px; height:20px;
    background:linear-gradient(135deg, #E9C765, var(--gold));
    opacity:.85;
    border:1px solid rgba(0,0,0,0.15);
    z-index:2;
  }
  .tape.tl{ top:-11px; left:16px; transform:rotate(-8deg);}
  .tape.tr{ top:-11px; right:16px; transform:rotate(7deg);}

  #stage{
    width:100%;
    display:block;
    border-radius:10px;
    touch-action:manipulation;
    cursor:pointer;
  }

  .hint{
    text-align:center;
    font-size:12px;
    color:#8a7c6a;
    margin:10px 4px 0;
  }

  .dock{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--panel);
    border-top:3px solid var(--ink);
    box-shadow:0 -6px 18px rgba(43,33,24,0.12);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .dock-inner{
    max-width:520px; margin:0 auto;
    display:flex; align-items:center; gap:10px;
  }
  .crayons{
    display:flex; gap:6px; overflow-x:auto; padding:6px 2px 8px;
    flex:1;
    scrollbar-width:thin;
  }
  .crayon-btn{
    flex:0 0 auto;
    width:28px; height:48px;
    border:none;
    cursor:pointer;
    position:relative;
    background:transparent;
    padding:0;
    transition:transform .12s ease;
  }
  .crayon-btn .body{
    position:absolute; left:0; right:0; bottom:0; top:13px;
    border-radius:4px 4px 8px 8px;
    border:2px solid var(--ink);
  }
  .crayon-btn .tip{
    position:absolute; left:5px; right:5px; top:0; height:15px;
    border-radius:6px 6px 2px 2px;
    border:2px solid var(--ink);
    border-bottom:none;
  }
  .crayon-btn:nth-child(odd){ transform:rotate(-4deg); }
  .crayon-btn:nth-child(even){ transform:rotate(4deg); }
  .crayon-btn.selected{ transform:translateY(-7px) rotate(0deg) scale(1.08); }
  .crayon-btn.selected::after{
    content:"";
    position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
    width:6px; height:6px; border-radius:50%; background:var(--crimson);
  }

  .action-btn{
    flex:0 0 auto;
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    border-radius:14px;
    padding:11px 9px;
    cursor:pointer;
    border:3px solid var(--ink);
    box-shadow:0 3px 0 var(--ink);
    display:flex; flex-direction:column; align-items:center; gap:2px;
    line-height:1.1;
    min-width:54px;
    background:#fff; color:var(--ink);
  }
  .action-btn:active{ transform:translateY(3px); box-shadow:none; }
  .action-btn.save{ background:var(--crimson); color:#fff; border-color:var(--crimson); box-shadow:0 3px 0 #5c0f0f; }
  .action-btn .ic{ font-size:17px; }
  .action-btn.score{ background:var(--gold); color:var(--ink); border-color:var(--ink); box-shadow:0 3px 0 var(--ink); }

  .crayon-btn.white .body,
  .crayon-btn.white .tip{
    box-shadow: inset 0 0 0 1px #ddd;
  }
  .crayon-btn.white .body{ border-color:#9c9284; }
  .crayon-btn.white .tip{ border-color:#9c9284; }

  .loading{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.85);
    border-radius:10px;
    font-size:14px;
    font-weight:700;
    color:var(--crimson);
    z-index:5;
  }
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(43,33,24,0.55);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .score-card{
    background:var(--paper);
    border:4px solid var(--ink);
    border-radius:20px;
    max-width:340px; width:100%;
    padding:24px 20px 20px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
    position:relative;
  }
  .score-card .eyebrow{
    display:inline-block;
    background:var(--crimson);
    color:#fff;
    font-size:12px;
    font-weight:700;
    padding:4px 14px;
    border-radius:999px;
    margin-bottom:10px;
  }
  .score-card h2{
    margin:4px 0 2px;
    font-size:17px;
    font-weight:800;
  }
  .score-stars{
    font-size:26px;
    letter-spacing:2px;
    margin:10px 0 6px;
  }
  .score-number{
    font-size:52px;
    font-weight:800;
    color:var(--crimson);
    line-height:1;
    margin:6px 0;
  }
  .score-number sub{
    font-size:18px;
    font-weight:700;
    color:var(--ink);
  }
  .score-msg{
    font-size:14px;
    line-height:1.6;
    margin:10px 0 18px;
  }
  .score-close{
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    background:var(--crimson);
    color:#fff;
    border:3px solid var(--crimson);
    border-radius:14px;
    padding:10px 26px;
    cursor:pointer;
    box-shadow:0 3px 0 #5c0f0f;
  }
  .score-close:active{ transform:translateY(3px); box-shadow:none; }
</style>
</head>
<body>

<header>
  <div class="brandmark"><span class="dot"></span>Chibo Kids</div>
  <h1>コックさんの おこのみやき ぬりえ</h1>
  <p>いろを えらんで、ぬりたい ばしょを タップしてね♪</p>
</header>

<main>
  <div class="canvas-wrap">
    <div class="tape tl"></div>
    <div class="tape tr"></div>
    <canvas id="stage"></canvas>
    <div class="loading" id="loading">よみこみちゅう…</div>
  </div>
  <p class="hint">※ ぬりたい ばしょを ゆびで タップすると、そこの いろが かわるよ</p>
</main>

<div class="dock">
  <div class="dock-inner">
    <div class="crayons" id="crayons"></div>
    <button class="action-btn" id="resetBtn"><span class="ic">🧽</span>けす</button>
    <button class="action-btn score" id="scoreBtn"><span class="ic">⭐</span>さいてん</button>
    <button class="action-btn save" id="saveBtn"><span class="ic">💾</span>ほぞん</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="score-card">
    <span class="eyebrow">Chibo Kids さいてん</span>
    <h2>できあがり ど〜！</h2>
    <div class="score-stars" id="scoreStars">⭐⭐⭐⭐⭐</div>
    <div class="score-number" id="scoreNumber">100<sub>てん</sub></div>
    <p class="score-msg" id="scoreMsg">とっても じょうずに ぬれたね！</p>
    <button class="score-close" id="scoreCloseBtn">とじる</button>
  </div>
</div>

<script>
  const COLORS = [
    "#FFFFFF","#E4432D","#F2933D","#F6C445","#8FC63E","#3E9B4F",
    "#4FB6D8","#2E6FBA","#8B5FBF","#F07EA8","#8B5A2B","#2B2118"
  ];
  let currentColor = "#E4432D";
  let currentRGB = hexToRgb(currentColor);
  const usedColors = new Set(); // for scoring: which crayons were actually used

  function hexToRgb(hex){
    const v = parseInt(hex.slice(1),16);
    return [ (v>>16)&255, (v>>8)&255, v&255 ];
  }

  // build crayon palette
  const crayonWrap = document.getElementById('crayons');
  COLORS.forEach((c) => {
    const btn = document.createElement('button');
    const isWhite = c === '#FFFFFF';
    btn.className = 'crayon-btn' + (isWhite ? ' white' : '') + (c === currentColor ? ' selected' : '');
    btn.innerHTML = `<span class="tip" style="background:${c}"></span><span class="body" style="background:${c}"></span>`;
    btn.addEventListener('click', () => {
      currentColor = c;
      currentRGB = hexToRgb(c);
      document.querySelectorAll('.crayon-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    crayonWrap.appendChild(btn);
  });

  img.src = IMG_SRC;

  function render(){
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(fillCanvas, 0, 0);
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(lineCanvas, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
  }

  let visited; // reused buffer
  function floodFill(startX, startY, rgb){
    const idx0 = startY * W + startX;
    if (wallMask[idx0] === 1) return; // tapped on a line, ignore

    if (!visited || visited.length !== W * H) visited = new Uint8Array(W * H);
    else visited.fill(0);

    const imgData = fillCtx.getImageData(0, 0, W, H);
    const data = imgData.data;

    const stack = [idx0];
    visited[idx0] = 1;
    const [r, g, b] = rgb;

    while (stack.length) {
      const p = stack.pop();
      const x = p % W;
      const y = (p - x) / W;
      const di = p * 4;
      data[di] = r; data[di+1] = g; data[di+2] = b; data[di+3] = 255;

      // 4-neighbors
      if (x > 0) { const n = p - 1; if (!visited[n] && wallMask[n] === 0) { visited[n]=1; stack.push(n); } }
      if (x < W-1) { const n = p + 1; if (!visited[n] && wallMask[n] === 0) { visited[n]=1; stack.push(n); } }
      if (y > 0) { const n = p - W; if (!visited[n] && wallMask[n] === 0) { visited[n]=1; stack.push(n); } }
      if (y < H-1) { const n = p + W; if (!visited[n] && wallMask[n] === 0) { visited[n]=1; stack.push(n); } }
    }

    fillCtx.putImageData(imgData, 0, 0);
    render();
  }

  function handleTap(clientX, clientY){
    const rect = stage.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = Math.floor((clientX - rect.left) * scaleX);
    const y = Math.floor((clientY - rect.top) * scaleY);
    if (x < 0 || y < 0 || x >= W || y >= H) return;

    usedColors.add(currentColor);
    floodFill(x, y, currentRGB);
  }

  stage.addEventListener('click', (e) => {
    handleTap(e.clientX, e.clientY);
  });

  // Ignore taps that are actually part of a pinch-zoom gesture (2+ fingers).
  let isPinching = false;
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) isPinching = true;
  }, { passive: true });
  stage.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) isPinching = true;
  }, { passive: true });
  stage.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      if (isPinching) { isPinching = false; return; }
      if (e.changedTouches && e.changedTouches[0]) {
        e.preventDefault();
        const t = e.changedTouches[0];
        handleTap(t.clientX, t.clientY);
      }
    }
  }, { passive: false });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!fillCtx) return;
    fillCtx.fillStyle = '#FFFFFF';
    fillCtx.fillRect(0, 0, W, H);
    render();
    usedColors.clear();
  });

  document.getElementById('saveBtn').addEventListener('click', saveImage);

  function saveImage(){
    if (!stage) return;
    stage.toBlob(async (blob) => {
      if (!blob) return;
      const file = new File([blob], 'chibo-nurie.png', { type: 'image/png' });

      // Best path on phones: native share sheet, includes "save to photos".
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'ぬりえ' });
          return;
        } catch (err) {
          // user cancelled the share sheet, or it failed — fall through to backup
        }
      }

      // Fallback (older browsers / iOS Safari ignoring the download attribute):
      // open the image in a new tab so it can be long-pressed and saved,
      // and also attempt a normal download link for desktop browsers.
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'chibo-nurie.png';
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      const win = window.open(url, '_blank');
      if (win) {
        showToast('ながおし → 「イメージを保存」で ほぞんしてね');
      } else {
        showToast('ほぞんできない ばあいは、がめんを ながおししてね');
      }
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }, 'image/png');
  }

  let toastTimer = null;
  function showToast(msg){
    let toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toast';
      toast.style.cssText = 'position:fixed;left:50%;bottom:100px;transform:translateX(-50%);' +
        'background:#2B2118;color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;' +
        'font-family:"M PLUS Rounded 1c",sans-serif;z-index:60;max-width:80vw;text-align:center;' +
        'box-shadow:0 6px 16px rgba(0,0,0,0.25);';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }

  // --- scoring (a fun, always-encouraging assessment, not a real grade) ---
  const modalOverlay = document.getElementById('modalOverlay');
  const scoreNumber = document.getElementById('scoreNumber');
  const scoreStars = document.getElementById('scoreStars');
  const scoreMsg = document.getElementById('scoreMsg');

  function computeScore(){
    const data = fillCtx.getImageData(0, 0, W, H).data;
    let openCount = 0, coloredCount = 0;
    // sample every 3rd pixel for speed, that's plenty accurate for this purpose
    for (let p = 0, i = 0; p < W * H; p += 3, i += 12) {
      if (wallMask[p] === 0) {
        openCount++;
        if (!(data[i] === 255 && data[i+1] === 255 && data[i+2] === 255)) {
          coloredCount++;
        }
      }
    }
    const coverage = openCount > 0 ? coloredCount / openCount : 0;
    const variety = Math.min(usedColors.size, 6) / 6;

    // generous scoring: everyone lands somewhere encouraging
    let score = Math.round(70 + coverage * 22 + variety * 8);
    score = Math.max(75, Math.min(100, score));
    return score;
  }

  function showScore(){
    if (!fillCtx) return;
    const score = computeScore();
    scoreNumber.innerHTML = score + '<sub>てん</sub>';
    const starCount = score >= 96 ? 5 : score >= 88 ? 5 : score >= 82 ? 4 : 3;
    scoreStars.textContent = '⭐'.repeat(starCount) + '☆'.repeat(5 - starCount);

    let msg;
    if (score >= 96) msg = 'パーフェクト！ カラフル シェフ にんてい！🏆';
    else if (score >= 88) msg = 'すごい！ とっても じょうずに ぬれたね！';
    else if (score >= 82) msg = 'いいね！ いろどりが きれいだよ！';
    else msg = 'たのしく ぬれたね！ また ちょうせんしてみよう！';
    scoreMsg.textContent = msg;

    modalOverlay.classList.add('show');

    // let the parent page (LP) know the coloring was completed, for stamp-rally integration
    try{
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'chibo-nurie-complete', score: score }, '*');
      }
    }catch(e){}
  }

  document.getElementById('scoreBtn').addEventListener('click', showScore);
  document.getElementById('scoreCloseBtn').addEventListener('click', () => {
    modalOverlay.classList.remove('show');
  });
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('show');
  });
</script>

</body>
</html>
